<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Resume — Options</title>
    <style>
      body {
        font-family: system-ui, "Roboto", sans-serif;
        max-width: 520px;
        margin: 40px auto;
        padding: 0 16px;
        color: #0f0f0f;
      }
      h1 {
        font-size: 20px;
      }
      label {
        display: block;
        margin: 16px 0 6px;
        font-weight: 600;
      }
      input,
      select {
        width: 100%;
        padding: 8px;
        font-size: 14px;
        box-sizing: border-box;
      }
      button {
        margin-top: 20px;
        padding: 10px 18px;
        font-size: 14px;
        cursor: pointer;
      }
      .hint {
        color: #606060;
        font-size: 13px;
        margin-top: 6px;
      }
      .saved {
        color: #0a7d28;
        margin-left: 12px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <h1>YouTube Resume — Options</h1>

    <label for="apiKey">OpenAI API key</label>
    <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />
    <div class="hint">
      Your key is stored only in this browser (chrome.storage.local) and is used
      to call the OpenAI API.
    </div>

    <label for="model">Model</label>
    <select id="model">
      <option value="gpt-4o-mini">gpt-4o-mini (cheap and fast)</option>
      <option value="gpt-4o">gpt-4o (higher quality)</option>
    </select>

    <div>
      <button id="save" type="button">Save</button>
      <span class="saved" id="saved" hidden>Saved ✓</span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
